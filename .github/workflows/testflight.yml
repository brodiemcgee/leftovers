name: iOS TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'apps/ios/**'
      - '.github/workflows/testflight.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/ios
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          set -euo pipefail
          # Pick the highest-versioned Xcode_*.app on the runner.
          XCODE_APP=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n1)
          if [ -z "$XCODE_APP" ]; then
            XCODE_APP="/Applications/Xcode.app"
          fi
          echo "Using $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Import Apple Distribution cert
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_P12_PASSWORD: ${{ secrets.DIST_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DIST_CERT_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | xargs)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Set up App Store Connect API key
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_P8_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
          # Make the key id and issuer available for xcodebuild via env
          echo "ASC_API_KEY_ID=$ASC_API_KEY_ID" >> "$GITHUB_ENV"
          echo "ASC_API_ISSUER_ID=$ASC_API_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Write Local.xcconfig from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          # xcconfig treats `//` as start-of-comment. Any value containing `//`
          # must be escaped with `/$()/` so the build settings parser sees the
          # raw value. Applies to URLs and to JWTs (which contain base64 chars).
          escape() { printf '%s' "$1" | sed 's|//|/$()/|g'; }
          cat > Local.xcconfig <<EOF
          // Generated by GitHub Actions — do not commit
          SUPABASE_URL = $(escape "$SUPABASE_URL")
          SUPABASE_ANON_KEY = $(escape "$SUPABASE_ANON_KEY")
          API_BASE_URL = $(escape "$API_BASE_URL")
          EOF
          # Visibility: dump the file with the JWT redacted so we can verify
          sed 's/\(SUPABASE_ANON_KEY = \).*/\1<redacted>/' Local.xcconfig

      - name: Compute next build number from App Store Connect
        env:
          BUNDLE_ID: com.brodiemcgee.leftovers
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/jwtvenv"
          "$RUNNER_TEMP/jwtvenv/bin/pip" install --quiet --disable-pip-version-check PyJWT cryptography
          PY="$RUNNER_TEMP/jwtvenv/bin/python"
          export KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"

          JWT=$("$PY" -c "
          import jwt, time, os
          print(jwt.encode(
              {
                  'iss': os.environ['ASC_API_ISSUER_ID'],
                  'iat': int(time.time()),
                  'exp': int(time.time()) + 1200,
                  'aud': 'appstoreconnect-v1',
              },
              open(os.environ['KEY_PATH']).read(),
              algorithm='ES256',
              headers={'kid': os.environ['ASC_API_KEY_ID']},
          ))
          ")

          APP_ID=$(curl -fsSL -H "Authorization: Bearer $JWT" \
            "https://api.appstoreconnect.apple.com/v1/apps?filter%5BbundleId%5D=$BUNDLE_ID" \
            | jq -r '.data[0].id')
          echo "App ID: $APP_ID"

          LATEST=$(curl -fsSL -H "Authorization: Bearer $JWT" \
            "https://api.appstoreconnect.apple.com/v1/builds?filter%5Bapp%5D=$APP_ID&sort=-uploadedDate&limit=20" \
            | jq -r '[.data[].attributes.version | tonumber] | max // 0')
          NEXT=$((LATEST + 1))
          echo "Latest uploaded build: $LATEST → using $NEXT"

          # CFBundleShortVersionString must be ≥ the highest preReleaseVersion in ASC.
          # Use what's committed in Info.plist if it's already higher; otherwise lift it.
          LATEST_MARKETING=$(curl -fsSL -H "Authorization: Bearer $JWT" \
            "https://api.appstoreconnect.apple.com/v1/preReleaseVersions?filter%5Bapp%5D=$APP_ID&sort=-version&limit=1" \
            | jq -r '.data[0].attributes.version // "1.0"')
          COMMITTED=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Leftovers/Info.plist)
          # Pick the higher of committed and ASC's latest (string version compare)
          MARKETING=$(printf '%s\n%s\n' "$COMMITTED" "$LATEST_MARKETING" | sort -V | tail -n1)
          echo "Marketing version: committed=$COMMITTED asc-latest=$LATEST_MARKETING → using $MARKETING"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $MARKETING" Leftovers/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEXT" Leftovers/Info.plist

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive
        run: |
          xcodebuild archive \
            -project Leftovers.xcodeproj \
            -scheme Leftovers \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Leftovers.xcarchive" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Embed entitlements (ad-hoc sign)
        run: |
          codesign --force --sign "-" \
            --entitlements Leftovers/Leftovers.entitlements \
            "$RUNNER_TEMP/Leftovers.xcarchive/Products/Applications/Leftovers.app"

      - name: Write ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>W25KJK652Y</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>upload</string>
          </dict>
          </plist>
          PLIST

      - name: Export, sign, and upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Leftovers.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/Leftovers-export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID"
